services:
  db:
    image: postgres:latest
    container_name: duo-db
    environment:
      POSTGRES_DB: duo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d duo"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-dev:
    build:
      context: .
      target: dev
    container_name: duo-web-dev
    profiles:
      - dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Cache cargo registry and target folders to speed up build times
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      - PORT=8000
      - DB_HOST=db
      - DB_NAME=duo
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=password
      - JWT_SECRET=AEIOU
    depends_on:
      db:
        condition: service_healthy

  web-prod:
    build:
      context: .
      target: prod
    container_name: duo-web-prod
    profiles:
      - prod
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DB_HOST=db
      - DB_NAME=duo
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=password
      - JWT_SECRET=AEIOU
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  cargo_cache:
  target_cache:
